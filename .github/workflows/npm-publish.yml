name: Publish to npmjs.com

on:
  create:
    tags:
      - v*

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - run: |
          node --version
          npm --version
      - run: npm install
      - run: npm run build
      - run: npm publish --access public --provenance
